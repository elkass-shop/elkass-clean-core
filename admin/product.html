<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../css/premium.css"><title>Produkt</title></head><body class="admin-shell"><main class="admin-wrap"><div class="admin-hero"><h1>📦 Dodaj produkt krok po kroku</h1><p><a class="btn" href="index.html">Panel</a></p></div><section class="admin-box"><label>Nazwa<input id="name"></label><label>Kategoria<select id="cats"></select></label><label>Cena<input id="price"></label><label>Stara cena<input id="oldPrice"></label><label>Rabat<input id="discount" placeholder="-20%"></label><label>Stan magazynowy<input id="stock" type="number" value="1"></label><label><input type="checkbox" id="promo"> Pokaż w promocjach</label><label>Typ promocji<select id="promoType"><option value="promotion">Promocja</option><option value="hit">Hit tygodnia</option><option value="new">Nowość</option><option value="bestseller">Bestseller</option><option value="sale">Wyprzedaż</option><option value="manufacturer">Producent miesiąca</option></select></label><label><input type="checkbox" id="featured"> Najczęściej wybierane</label><label><input type="checkbox" id="active" checked> Aktywny produkt</label><label>Premium badge po przecinku<input id="badges" placeholder="Smart TV, HDR, No Frost"></label><label>Cechy produktu po przecinku<input id="features"></label><label>Porada specjalisty<textarea id="advisor"></textarea></label><label>Opis produktu<textarea id="description"></textarea></label><label>Wklej dane producenta<textarea id="raw" placeholder="Wymiary: ...&#10;Pojemność: ...&#10;Program szybki - opis"></textarea></label><label>Galeria / Smart Media Engine — ścieżki po przecinku<textarea id="images" placeholder="assets/products/tv.svg"></textarea></label><button id="saveBtn">Zapisz produkt</button></section></main><script src="admin.js"></script><script>productPage()</script></body></html>
