<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="admin.css"><title>Dodaj produkt</title></head><body><main class="wrap"><div class="top"><h1>📦 Dodaj produkt krok po kroku</h1><a href="index.html">Panel</a></div><section class="box"><label>Nazwa<input id="name"></label><label>Kategoria<select id="cats"></select></label><label>Cena<input id="price"></label><label>Stara cena<input id="oldPrice"></label><label>Rabat<input id="discount" placeholder="-20%"></label><label><input type="checkbox" id="promo"> Pokazuj w promocjach</label><label><input type="checkbox" id="active" checked> Aktywny produkt</label><label>Premium badge po przecinku<input id="badges" placeholder="Smart TV, HDR, No Frost"></label><label>Cechy produktu po przecinku<input id="features"></label><label>Opis produktu<textarea id="description"></textarea></label><label>Wklej dane producenta<textarea id="raw" placeholder="Wymiary: ...&#10;Pojemność: ...&#10;Program szybki - opis"></textarea></label><label>Galeria produktu — ścieżki zdjęć po przecinku<textarea id="images" placeholder="assets/products/tv.svg"></textarea></label><button id="save">Zapisz produkt</button></section></main><script src="admin.js"></script><script>productPage()</script></body></html>
