<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../css/alpha.css"><title>Product Builder</title></head><body class="admin-shell"><main class="admin-wrap"><div class="admin-hero"><h1>Product Builder RC</h1><p>Parser opisu producenta, badge, parametry i karta produktu.</p><p><a class="btn" href="index.html">Panel</a></p></div><section class="admin-box"><label>Nazwa<input id="name"></label><label>Kategoria<select id="cat"></select></label><label>Cena<input id="price"></label><label>Stara cena<input id="oldPrice"></label><label>Rabat<input id="discount"></label><label>Stan<input id="stock" type="number" value="1"></label><label><input id="promo" type="checkbox"> Promocja</label><label><input id="featured" type="checkbox"> Najczęściej wybierane</label><label>Zdjęcie<input id="image" placeholder="assets/products/tv.svg"></label><label>Badge<input id="badges" placeholder="Smart TV, HDR, No Frost"></label><label>Cechy<input id="features"></label><label>Porada specjalisty<textarea id="advisor"></textarea></label><label>Opis producenta<textarea id="raw"></textarea></label><button id="parseBtn">Przetwórz opis</button><p id="parserResult"></p><label>Opis finalny<textarea id="desc"></textarea></label><button id="saveProduct">Zapisz produkt</button></section><section id="productList" class="admin-grid"></section></main><script src="admin.js"></script><script>productPage()</script></body></html>
