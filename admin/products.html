<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../css/alpha.css"><title>Product Builder</title></head><body class="admin-shell"><main class="admin-wrap">
<div class="admin-hero"><h1>Product Builder Beta</h1><p>Wklej opis producenta — system rozdzieli parametry, cechy, badge i opis.</p><p><a class="btn" href="index.html">Panel</a></p></div>
<section class="admin-box">
<label>Nazwa<input id="name"></label>
<label>Kategoria<select id="category"></select></label>
<label>Cena<input id="price"></label>
<label>Stara cena<input id="oldPrice"></label>
<label>Rabat<input id="discount"></label>
<label>Stan magazynowy<input id="stock" type="number" value="1"></label>
<label>Obraz / media<input id="image" placeholder="assets/products/tv.svg"></label>
<label><input id="promo" type="checkbox"> Promocja</label>
<label><input id="featured" type="checkbox"> Najczęściej wybierane</label>
<label><input id="draft" type="checkbox"> Kopia robocza</label>
<label><input id="active" type="checkbox" checked> Aktywny</label>
<label>Typ promocji<select id="promoType"><option value="promotion">Promocja</option><option value="hit">Hit tygodnia</option><option value="new">Nowość</option><option value="bestseller">Bestseller</option><option value="sale">Wyprzedaż</option><option value="manufacturer">Producent miesiąca</option></select></label>
<label>Start promocji<input id="promoStart" type="date"></label>
<label>Koniec promocji<input id="promoEnd" type="date"></label>
<label>Badge<input id="badges" placeholder="Smart TV, No Frost, 8 kg"></label>
<label>Cechy<input id="features" placeholder="cecha 1, cecha 2"></label>
<label>Porada specjalisty<textarea id="advisor"></textarea></label>
<label>Opis produktu<textarea id="description"></textarea></label>
<label>Opis producenta / dane techniczne<textarea id="raw" placeholder="Wymiary: ...&#10;Pojemność: ..."></textarea></label>
<button id="parseBtn" type="button">Przetwórz opis producenta</button>
<div id="specsPreview" class="admin-box"></div>
<button id="saveBtn">Zapisz produkt</button>
</section>
<section id="list" class="admin-grid"></section>
</main><script src="admin.js"></script><script>productPage()</script></body></html>
