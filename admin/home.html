<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="../css/premium.css"><title>Home Builder</title></head><body class="admin-shell"><main class="admin-wrap"><div class="admin-hero"><h1>🏠 Home Builder 2.0</h1><p>Dodawaj sekcje, ukrywaj, aktywuj i zmieniaj kolejność bez kodu.</p><p><a class="btn" href="index.html">Panel</a></p></div><section class="admin-box"><h2>+ Dodaj sekcję</h2><div class="admin-tools"><label>Typ sekcji<select id="newType"><option value="hero">Hero</option><option value="product-carousel">Promocje / produkty</option><option value="brand-carousel">Karuzela producentów</option><option value="categories">Kategorie</option><option value="comments">Opinie</option><option value="banner">Baner</option><option value="custom">Własna sekcja</option></select></label><label>Tytuł<input id="newTitle" placeholder="Np. Producent miesiąca"></label><label>Podtytuł<input id="newSubtitle"></label><label>Układ<select id="newLayout"><option value="grid">Grid</option><option value="carousel">Karuzela</option><option value="slider">Slider</option><option value="banner">Baner</option></select></label><label><input type="checkbox" id="newAutoplay"> Przewijaj automatycznie</label><label>Czas przewijania ms<input id="newInterval" type="number" value="5000"></label></div><button onclick="addHomeSection()">Dodaj sekcję</button></section><section class="admin-box"><h2>Aktualne sekcje</h2><div id="sections"></div></section></main><script src="admin.js"></script><script>homePage()</script></body></html>
